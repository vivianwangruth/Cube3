<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            margin: 0;
            padding: 0;
        }
        .description {
            flex: 1;
            padding: 20px;
            border-right: 1px solid #555;
        }
        .media {
            flex: 1;
            padding: 20px;
        }
        h1, h2, p {
            color: white;
        }
    </style>
</head>
<body>
    <div class="description">
        <h1>Product Description</h1>
        <p>This is where your product description goes. Add details about your product, features, and benefits here.</p>
    </div>
    <div class="media">
        <h1>Media Section</h1>
        <p>This section is for videos, photos, and article links related to your product.</p>
    </div>
</body>
</html>
